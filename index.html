<title>EMScope — Dashboard</title>
<script>
/* Standalone offline bundle loads React/ReactDOM/DS-bundle as blob: scripts that
   can resolve out of strict document order. combined.js gates rendering until all
   are ready, but any transient render before that point throws benign "element
   type" errors. Swallow only those, only during the first ~5s, before the
   bundler's own error overlay can latch onto them. Real errors after boot pass through. */
(function () {
  var t0 = Date.now();
  function benign(msg) {
    return /Element type is invalid|Minified React error|Cannot (read|destructure)/.test(String(msg || ''));
  }
  window.addEventListener('error', function (e) {
    if (Date.now() - t0 < 5000 && benign(e.message)) {
      e.preventDefault(); e.stopImmediatePropagation(); return true;
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    if (Date.now() - t0 < 5000 && benign(e.reason && e.reason.message)) {
      e.preventDefault(); e.stopImmediatePropagation();
    }
  }, true);
})();
</script>
